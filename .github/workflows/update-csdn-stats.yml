name: Update CSDN stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch CSDN total views
        run: |
          python3 << 'EOF'
          import json, re, urllib.request

          req = urllib.request.Request(
              "https://blog.csdn.net/L_Z_J_I",
              headers={"User-Agent": "Mozilla/5.0 (compatible; LZJ-I-stats/1.0)"},
          )
          with urllib.request.urlopen(req, timeout=45) as r:
              html = r.read().decode("utf-8", errors="ignore")
          m = re.search(
              r'wholeSiteViewCount"\s*:\s*\{\s*"total"\s*:\s*"([^"]+)"',
              html,
          )
          views = m.group(1) if m else "0"
          with open("data/csdn-stats.json", "w", encoding="utf-8") as f:
              json.dump({"views": views}, f, ensure_ascii=False)
              f.write("\n")
          print(views)
          EOF
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/csdn-stats.json
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "chore: update CSDN stats"
            git push
          fi
