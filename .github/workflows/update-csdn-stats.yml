name: Update CSDN stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch CSDN total views
        id: fetch
        continue-on-error: true
        run: |
          python3 << 'EOF'
          import json, re, time, urllib.error, urllib.request

          url = "https://blog.csdn.net/L_Z_J_I"
          headers = {"User-Agent": "Mozilla/5.0 (compatible; LZJ-I-stats/1.0)"}
          pattern = r'wholeSiteViewCount"\s*:\s*\{\s*"total"\s*:\s*"([^"]+)"'

          last_err = None
          for attempt in range(1, 6):
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=60) as r:
                      html = r.read().decode("utf-8", errors="ignore")
                  m = re.search(pattern, html)
                  if not m:
                      raise ValueError("CSDN page loaded but total views not found")
                  views = m.group(1)
                  with open("data/csdn-stats.json", "w", encoding="utf-8") as f:
                      json.dump({"views": views}, f, ensure_ascii=False)
                      f.write("\n")
                  print(f"views={views} attempt={attempt}")
                  raise SystemExit(0)
              except Exception as e:
                  last_err = e
                  print(f"attempt {attempt}/5 failed: {e}")
                  if attempt < 5:
                      time.sleep(15 * attempt)

          print(f"all retries failed, keeping existing stats: {last_err}")
          raise SystemExit(1)
          EOF
      - name: Commit if changed
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/csdn-stats.json
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "chore: update CSDN stats"
            git push
          fi
